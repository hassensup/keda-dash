services:
  backend:
    build:
      context: .
      target: backend-final
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/backend/keda_dashboard.db
      - K8S_MODE=mock
    volumes:
      - ./backend:/app/backend
      - ./frontend/build:/app/frontend/build
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      target: frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    depends_on:
      backend:
        condition: service_healthy
