replicaCount: 1

# Frontend Configuration
frontend:
  # Public URL where the frontend is accessible
  # Used for OAuth redirects after Okta authentication
  # If not set, will be derived from ingress.hosts or default to http://localhost:3000
  url: ""

# Backend Configuration
backend:
  image:
    repository: keda-dashboard-backend
    pullPolicy: IfNotPresent
    tag: "latest"
  service:
    port: 8001
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config:
    adminEmail: "admin@example.com"
    adminPassword: "admin123"
    corsOrigins: "*"
    k8sMode: "in-cluster"

# Authentication Configuration
auth:
  # JWT token configuration
  jwt:
    # REQUIRED: Secret key for signing JWT tokens
    # SECURITY: Must be changed in production! Use a cryptographically secure random string.
    # Generate with: openssl rand -base64 32
    secret: "change-me-in-production-use-a-long-random-string"
    # Token expiration time in hours
    expirationHours: 24
  
  # Local username/password authentication
  local:
    # Enable local authentication (username/password)
    enabled: true
  
  # Okta SSO authentication
  okta:
    # Enable Okta SSO authentication
    # When enabled, all okta.* fields below become REQUIRED
    enabled: false
    
    # Okta organization domain (e.g., dev-12345.okta.com)
    # Required when okta.enabled=true
    domain: ""
    
    # Okta application client ID
    # Required when okta.enabled=true
    clientId: ""
    
    # Okta application client secret
    # Required when okta.enabled=true
    # SECURITY: Store securely, never commit to version control
    clientSecret: ""
    
    # OAuth2 redirect URI (must match Okta app configuration)
    # Required when okta.enabled=true
    # Example: https://keda-dashboard.example.com/api/auth/okta/callback
    redirectUri: ""
    
    # OAuth2 scopes to request (optional)
    scopes: "openid profile email"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

ingress:
  # Enable Ingress to expose the application publicly
  enabled: false
  
  # Ingress class name (e.g., nginx, alb, traefik)
  className: "nginx"
  
  # Annotations for Ingress configuration
  # Examples for different Ingress controllers:
  annotations: {}
    # For NGINX Ingress Controller:
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # For AWS ALB Ingress Controller:
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account:certificate/xxx
  
  # Ingress hosts configuration
  hosts:
    - host: keda-dashboard.local
      paths:
        - path: /
          pathType: Prefix
  
  # TLS configuration for HTTPS
  tls: []
    # - secretName: keda-dashboard-tls
    #   hosts:
    #     - keda-dashboard.example.com

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    username: keda
    password: keda-secret
    database: keda_dashboard
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
