replicaCount: 1

image:
  repository: keda-dashboard
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  create: true

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: keda-dashboard.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    username: keda
    password: keda-secret
    database: keda_dashboard
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

config:
  jwtSecret: "change-me-in-production-use-a-long-random-string"
  adminEmail: "admin@example.com"
  adminPassword: "admin123"
  corsOrigins: "*"
  k8sMode: "in-cluster"

nodeSelector: {}
tolerations: []
affinity: {}
