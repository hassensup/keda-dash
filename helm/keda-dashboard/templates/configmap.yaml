apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keda-dashboard.fullname" . }}-config
  labels:
    {{- include "keda-dashboard.labels" . | nindent 4 }}
data:
  CORS_ORIGINS: {{ .Values.config.backend.corsOrigins | quote }}
  ADMIN_EMAIL: {{ .Values.config.backend.adminEmail | quote }}
  K8S_MODE: {{ .Values.config.backend.k8sMode | quote }}
