apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keda-dashboard.fullname" . }}-secret
  labels:
    {{- include "keda-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "keda-dashboard.databaseUrl" . | quote }}
  JWT_SECRET: {{ .Values.auth.jwt.secret | quote }}
  ADMIN_PASSWORD: {{ .Values.backend.config.adminPassword | quote }}
  {{- if .Values.auth.okta.enabled }}
  OKTA_CLIENT_SECRET: {{ .Values.auth.okta.clientSecret | quote }}
  {{- end }}
