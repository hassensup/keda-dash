{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keda-dashboard.fullname" . }}-postgresql-init
  labels:
    {{- include "keda-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
data:
  init.sh: |
    #!/bin/bash
    set -e
    
    # Wait for PostgreSQL to be ready
    until pg_isready -U "${POSTGRES_USER}" -d postgres; do
      echo "Waiting for PostgreSQL to be ready..."
      sleep 2
    done
    
    # Check if database exists, create if not
    psql -U "${POSTGRES_USER}" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_DB}'" | grep -q 1 || \
      psql -U "${POSTGRES_USER}" -d postgres -c "CREATE DATABASE ${POSTGRES_DB}"
    
    echo "Database ${POSTGRES_DB} is ready"
{{- end }}
