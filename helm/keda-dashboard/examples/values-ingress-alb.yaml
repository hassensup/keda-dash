# Example configuration for AWS ALB Ingress Controller
# Usage: helm install keda-dash ./helm/keda-dashboard -f examples/values-ingress-alb.yaml

ingress:
  enabled: true
  className: "alb"
  annotations:
    # ALB scheme (internet-facing or internal)
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Target type (ip or instance)
    alb.ingress.kubernetes.io/target-type: ip
    
    # Listen ports (HTTP and HTTPS)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    
    # SSL redirect
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # ACM certificate ARN (replace with your certificate ARN)
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-1:123456789012:certificate/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    
    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '2'
    
    # Tags for the ALB
    alb.ingress.kubernetes.io/tags: Environment=production,Application=keda-dashboard
    
    # Optional: WAF ACL ARN
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:region:account:regional/webacl/name/id
    
  hosts:
    - host: keda-dashboard.example.com
      paths:
        - path: /
          pathType: Prefix
  
  # TLS is handled by ALB with ACM certificate
  tls: []

# Update Okta redirect URI to match the public URL
auth:
  okta:
    enabled: true
    domain: "your-org.okta.com"
    clientId: "your-client-id"
    clientSecret: "your-client-secret"
    redirectUri: "https://keda-dashboard.example.com/api/auth/okta/callback"
    scopes: "openid profile email"

# Update CORS origins to match the public URL
backend:
  config:
    corsOrigins: "https://keda-dashboard.example.com"
